name: Naukri Profile Update

on:
  schedule:
    - cron: "15 3 * * *" # 8:45 AM IST (3:15 AM UTC) daily
  workflow_dispatch: # Allow manual trigger

defaults:
  run:
    working-directory: naukriProfileAutomation

jobs:
  update-profile:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci

      - name: Run resume update
        env:
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
          RESUME_PATH: ../data/resume/Rizabul_SDE_Resume_DCE.pdf
          NAUKRI_FORM_KEY: ${{ secrets.NAUKRI_FORM_KEY }}
        run: node update-resume-api.js
